name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: JS syntax check (all modules under src/)
        run: |
          test -d src
          # Walk every .js file under src/ and parse-check it. Catches
          # syntax regressions introduced by edits to any module.
          find src -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: HTML/CSS sanity (presence + non-empty)
        run: |
          test -s index.html
          test -s style.css
          test -s src/main.js
          # crude check: every <link>/<script> referenced file exists.
          # Strip query strings (e.g. ?v=__BUILD__) before checking the path.
          grep -oE 'href="[^"]+"|src="[^"]+"' index.html \
            | sed -E 's/^(href|src)="//' \
            | sed -E 's/"$//' \
            | sed -E 's/\?.*$//' \
            | grep -vE '^https?://|^//|^#|^mailto:' \
            | while read -r f; do
                if [ -n "$f" ] && [ ! -e "$f" ]; then
                  echo "Missing referenced file: $f" >&2
                  exit 1
                fi
              done

  deploy:
    needs: check
    # Only the main branch is authorized to deploy to the Pages environment.
    # Branch pushes still run the check job for fast feedback, but skip the
    # deploy step (which would otherwise fail in 2s on environment auth).
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add .nojekyll
        run: touch .nojekyll
      - name: Stamp build hash for cache-busting
        run: |
          BUILD_ID="${GITHUB_SHA::8}-$(date -u +%s)"
          sed -i "s/__BUILD__/${BUILD_ID}/g" index.html
          echo "Stamped build: ${BUILD_ID}"
          grep -E '\?v=' index.html || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
